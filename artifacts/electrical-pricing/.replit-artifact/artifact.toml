kind = "web"
previewPath = "/"
title = "نظام تسعير المشاريع الكهربائية"
version = "1.0.0"
id = "artifacts/electrical-pricing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18460

[services.development]
run = "pnpm --filter @workspace/electrical-pricing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/electrical-pricing", "run", "build" ]
publicDir = "artifacts/electrical-pricing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18460"
BASE_PATH = "/"
